server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:hotel-inventory-demo-secret-key-32}

services:
  rooms:
    url: ${ROOMS_SERVICE_URL:http://localhost:8080}

  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8081}