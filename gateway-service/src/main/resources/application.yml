server:
  port: ${PORT:8080}

spring:
  application:
    name: gateway-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    secret: ${JWT_SECRET:hotel-inventory-demo-secret-key-32}

services:
  rooms:
    url: ${ROOMS_SERVICE_URL:http://localhost:8080}

  inventory:
    url: ${INVENTORY_SERVICE_URL:http://localhost:8081}